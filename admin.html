<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tilf Habesha Admin Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-amber-500 text-slate-900 p-2 rounded-lg font-bold tracking-wider text-sm">TH</div>
        <h1 class="text-xl font-bold tracking-tight">Tilf Habesha <span class="text-amber-400 font-medium text-sm border-l border-slate-700 pl-3 ml-2">Admin Portal</span></h1>
      </div>
      <div id="globalLoader" class="hidden flex items-center space-x-2 text-amber-400 text-sm">
        <svg class="animate-spin h-5 w-5 text-amber-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Processing Sync...</span>
      </div>
    </div>
  </header>

  <nav class="bg-white border-b border-slate-200 sticky top-16 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex space-x-2 overflow-x-auto py-2 tabs" role="tablist">
        <button onclick="showTab(event,'orders')" class="tab-btn active px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 bg-slate-900 text-white shadow-sm flex items-center space-x-2 whitespace-nowrap">
          <span>Orders Log</span>
        </button>
        <button onclick="showTab(event,'addProduct')" class="tab-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-100 flex items-center space-x-2 whitespace-nowrap">
          <span>Add Product</span>
        </button>
        <button onclick="showTab(event,'editProduct')" class="tab-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-100 flex items-center space-x-2 whitespace-nowrap">
          <span>Edit Product</span>
        </button>
        <button onclick="showTab(event,'artisan')" class="tab-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-100 flex items-center space-x-2 whitespace-nowrap">
          <span>Artisan Profiles</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <!-- ── ORDERS ─────────────────────────────────────────────────────────── -->
    <section id="orders" class="tab-section block space-y-6">
      <div class="flex items-center justify-between border-b border-slate-200 pb-4">
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">System Purchase Orders</h2>
        <button onclick="loadOrders()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-sm transition-all flex items-center space-x-1">Refresh Data</button>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-4 max-h-[70vh] overflow-y-auto pr-2" id="ordersList"></div>
        <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-6 shadow-sm sticky top-40 min-h-[300px] flex flex-col justify-between">
          <div>
            <h3 class="text-lg font-bold text-slate-900 mb-4 border-b pb-2">Manifest Details</h3>
            <div id="orderDetail" class="text-slate-500 italic text-sm">Select an active purchase order from the log timeline to evaluate complete operational vectors.</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── ADD PRODUCT ────────────────────────────────────────────────────── -->
    <section id="addProduct" class="tab-section hidden max-w-3xl mx-auto bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight mb-6 border-b pb-4">Deploy New Product Inventory</h2>
      <div id="addForm" class="space-y-6"></div>
    </section>

    <!-- ── EDIT PRODUCT ───────────────────────────────────────────────────── -->
    <section id="editProduct" class="tab-section hidden max-w-3xl mx-auto bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight mb-6 border-b pb-4">Modify Catalog Registry</h2>
      <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-8 flex space-x-3 items-end">
        <div class="flex-grow">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Target Product System ID</label>
          <input id="editId" placeholder="e.g., silktibebdress" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm font-mono font-semibold">
        </div>
        <button onclick="loadProduct()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-lg text-sm transition-all shadow-sm">Load Registry</button>
      </div>
      <div id="editForm" class="space-y-6 hidden border-t pt-6"></div>
    </section>

    <!-- ── ARTISAN ─────────────────────────────────────────────────────────── -->
    <section id="artisan" class="tab-section hidden max-w-3xl mx-auto bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight mb-6 border-b pb-4">Artisan Profiles</h2>
      <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-8 flex space-x-3 items-end">
        <div class="flex-grow">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Query Artisan Document ID</label>
          <input id="artisanDocId" placeholder="Leave empty for new profile" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm font-medium">
        </div>
        <button onclick="loadArtisan()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-lg text-sm transition-all shadow-sm">Pull Document</button>
      </div>
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Linked System User Account</label>
          <select id="artisanUser" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm font-medium"></select>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Corporate / House Brand Identity</label>
          <input id="brandName" placeholder="Enter formal trading name" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Professional Bio</label>
          <textarea id="bio" rows="4" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Verified Telecom Routing</label>
          <input id="phone" placeholder="+251-9..." class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition text-sm">
        </div>
        <div class="pt-4 flex items-center justify-between border-t border-slate-100">
          <div id="artisanStats" class="text-sm font-semibold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-md hidden"></div>
          <button onclick="saveArtisan()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg text-sm transition shadow-sm ml-auto">Commit Profile Entry</button>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
  import { db } from "./assets/js/firebase.js";
  import {
    collection, getDocs, doc, getDoc,
    addDoc, updateDoc, setDoc,
    query, where, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const $ = id => document.getElementById(id);

  // ── State ─────────────────────────────────────────────────────────────────
  // pendingFiles = local File objects waiting to upload on commit
  // uploadedUrls = already-uploaded Cloudinary URLs (for edit: existing images)
  const state = {
    add:  { pendingFiles: [], uploadedUrls: [] },
    edit: { pendingFiles: [], uploadedUrls: [] }
  };

  const fabricOptions   = ["cotton tibeb", "linen", "silk", "velvet", "wool blend"];
  const categoryOptions = ["holiday", "women", "men", "wedding", "events", "new fashion", "casual"];

  // ── Cloudinary upload (called only on commit) ─────────────────────────────
  async function uploadFile(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "tilf_ml");
    const res  = await fetch("https://api.cloudinary.com/v1_1/dcc3dpccu/image/upload", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Upload failed");
    return data.secure_url;
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(message, type = "success") {
    const colors = {
      success: "bg-emerald-900 text-emerald-100 border-emerald-700",
      error:   "bg-rose-900 text-rose-100 border-rose-700",
      info:    "bg-slate-900 text-slate-100 border-slate-700"
    };
    const toast = document.createElement("div");
    toast.className = `p-4 border rounded-xl shadow-xl flex items-center pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0 text-xs font-semibold max-w-sm ${colors[type]}`;
    toast.innerHTML = `<span>${message}</span>`;
    $("toastContainer").appendChild(toast);
    setTimeout(() => toast.classList.remove("translate-y-2", "opacity-0"), 50);
    setTimeout(() => {
      toast.classList.add("opacity-0", "translate-x-4");
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function toggleGlobalLoader(show) {
    show ? $("globalLoader").classList.remove("hidden")
         : $("globalLoader").classList.add("hidden");
  }

  const normalizeTitle = t => t.toLowerCase().replace(/[^a-z0-9]/g, "");
  const slugify        = t => t.toLowerCase().replace(/\s+/g, "-");
  const deposit        = p => (Number(p) * 0.15).toFixed(2);

  // ── Tab switching ─────────────────────────────────────────────────────────
  window.showTab = (e, id) => {
    document.querySelectorAll(".tab-section").forEach(s => s.classList.add("hidden"));
    $(id).classList.remove("hidden");
    document.querySelectorAll(".tab-btn").forEach(b => {
      b.className = "tab-btn px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:bg-slate-100 flex items-center space-x-2 whitespace-nowrap";
    });
    e.currentTarget.className = "tab-btn active px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 bg-slate-900 text-white shadow-sm flex items-center space-x-2 whitespace-nowrap";
  };

  // ── Image engine: local preview only, no upload yet ───────────────────────
  window.attachImageEngine = (prefix) => {
    const input = $(`${prefix}_imgs`);
    if (!input) return;

    input.onchange = (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      files.forEach(file => {
        // Guard: max 10 images total
        if (state[prefix].pendingFiles.length + state[prefix].uploadedUrls.length >= 10) {
          showToast("Max 10 images allowed", "error");
          return;
        }

        const tempId = "prev-" + Math.random().toString(36).substr(2, 8);
        state[prefix].pendingFiles.push({ id: tempId, file });

        // Local preview using FileReader — no network call
        const reader = new FileReader();
        reader.onload = (ev) => {
          const wrapper = document.createElement("div");
          wrapper.id = tempId;
          wrapper.className = "relative group w-20 h-20 rounded-lg border border-slate-200 overflow-hidden shadow-sm";
          wrapper.innerHTML = `
            <img src="${ev.target.result}" class="w-full h-full object-cover"/>
            <div class="absolute top-0.5 left-0.5 bg-amber-500 text-slate-900 text-[8px] font-bold px-1 rounded">NEW</div>
            <button type="button"
              class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all text-white font-bold text-[10px]"
              onclick="removePending('${prefix}','${tempId}')">REMOVE</button>
          `;
          $(`${prefix}_prev`).appendChild(wrapper);
        };
        reader.readAsDataURL(file);
      });

      // Reset input so same file can be re-added if removed
      input.value = "";
    };
  };

  // Remove a pending (not yet uploaded) file from state + DOM
  window.removePending = (prefix, tempId) => {
    state[prefix].pendingFiles = state[prefix].pendingFiles.filter(f => f.id !== tempId);
    const el = document.getElementById(tempId);
    if (el) el.remove();
  };

  // Remove an already-uploaded URL (edit mode: existing Cloudinary image)
  window.removeUploaded = (prefix, url) => {
    state[prefix].uploadedUrls = state[prefix].uploadedUrls.filter(u => u !== url);
    showToast("Image removed", "info");
  };
/* ─────────────────────────────────────────────
   AUTO BUILD / UPDATE CATEGORIES FROM PRODUCTS
───────────────────────────────────────────── */
async function rebuildCategoriesFromProducts() {
  const snap = await getDocs(collection(db, "products"));

  const map = {}; // { women: { images:Set, count } }

  snap.forEach(docSnap => {
    const p = docSnap.data();
    const cats = p.categoryId || [];
    const img  = p.coverImage || p.images?.[0] || "";

    cats.forEach(c => {
      if (!map[c]) map[c] = { images: new Set(), count: 0 };
      if (img) map[c].images.add(img);
      map[c].count++;
    });
  });

  const ORDER = { women:1, men:2, wedding:3, holiday:4, events:5, casual:6 };

  for (const [cat, data] of Object.entries(map)) {
    const images = Array.from(data.images);

    await setDoc(doc(db, "categories", cat), {
      name: cat,
      slug: cat + "s",
      active: true,
      order: ORDER[cat] || 99,
      coverImage: images[0] || "",
      images
    }, { merge: true });
  }

  console.log("✓ Categories rebuilt from products");
}
  // ── Save product: upload pending files first, then write to Firestore ─────
  window.saveProduct = async (prefix) => {
    const title = $(`${prefix}_title`).value.trim();
    const price = Number($(`${prefix}_price`).value);
    if (!title || !price) return showToast("Title and Price are required", "error");

    const docId = prefix === "edit" ? $("editId").value.trim() : normalizeTitle(title);
    if (!docId) return showToast("Could not determine document ID", "error");

    toggleGlobalLoader(true);

    try {
      // ① Upload any pending local files now
      if (state[prefix].pendingFiles.length > 0) {
        showToast(`Uploading ${state[prefix].pendingFiles.length} image(s)…`, "info");
        for (const item of state[prefix].pendingFiles) {
          const url = await uploadFile(item.file);
          state[prefix].uploadedUrls.push(url);
          // Swap preview: remove NEW badge, show uploaded indicator
          const wrapper = document.getElementById(item.id);
          if (wrapper) {
            const badge = wrapper.querySelector(".bg-amber-500");
            if (badge) badge.remove();
            const done = document.createElement("div");
            done.className = "absolute top-0.5 left-0.5 bg-emerald-500 text-white text-[8px] font-bold px-1 rounded";
            done.textContent = "✓";
            wrapper.appendChild(done);
          }
        }
        state[prefix].pendingFiles = []; // clear after upload
      }

      // ② Write to Firestore
      await setDoc(doc(db, "products", docId), {
        title,
        slug:                 slugify(title),
        description:          $(`${prefix}_desc`).value.trim(),
        price,
        depositAmount:        Number(deposit(price)),
        fabric:               $(`${prefix}_fabric`).value,
        categoryId:           [...$(`${prefix}_cats`).querySelectorAll("input:checked")].map(x => x.value),
        measurementsRequired: $(`${prefix}_req`).checked,
        inStock:              $(`${prefix}_stock`).checked,
        images:               state[prefix].uploadedUrls,
        updatedAt:            serverTimestamp()
      }, { merge: true });
      await 
        rebuildCategoriesFromProducts();
      
      showToast("Product saved successfully ✓", "success");

      // ③ Reset add form after successful save
      if (prefix === "add") {
        state.add.pendingFiles  = [];
        state.add.uploadedUrls  = [];
        buildForm($("addForm"), "add");
      }

    } catch (err) {
      console.error(err);
      showToast("Error: " + err.message, "error");
    } finally {
      toggleGlobalLoader(false);
    }
  };

  // ── Load product into edit form ───────────────────────────────────────────
  window.loadProduct = async () => {
    const id = $("editId").value.trim();
    if (!id) return showToast("Enter a product ID", "error");

    toggleGlobalLoader(true);
    try {
      const snap = await getDoc(doc(db, "products", id));
      if (!snap.exists()) { showToast("Product not found", "error"); return; }

      const p = snap.data();
      buildForm($("editForm"), "edit");
      $("editForm").classList.remove("hidden");

      // Fill fields
      $("edit_title").value  = p.title       || "";
      $("edit_desc").value   = p.description || "";
      $("edit_price").value  = p.price       || "";
      $("edit_dep").innerText = deposit(p.price || 0);
      $("edit_fabric").value = p.fabric      || "";
      $("edit_req").checked   = !!p.measurementsRequired;
      $("edit_stock").checked = !!p.inStock;

      // Tick saved categories
      const saved = p.categoryId || [];
      $("edit_cats").querySelectorAll("input").forEach(cb => {
        cb.checked = saved.includes(cb.value);
      });

      // Load existing Cloudinary images into state and preview
      state.edit.uploadedUrls = p.images || [];
      state.edit.pendingFiles = [];
      $("edit_prev").innerHTML = "";

      state.edit.uploadedUrls.forEach(url => {
        $("edit_prev").insertAdjacentHTML("beforeend", `
          <div class="relative group w-20 h-20 rounded-lg border border-slate-200 overflow-hidden shadow-sm">
            <img src="${url}" class="w-full h-full object-cover"/>
            <button type="button"
              class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-[10px] font-bold transition-all"
              onclick="removeUploaded('edit','${url}'); this.closest('.relative').remove()">REMOVE</button>
          </div>`);
      });

    } catch (err) {
      console.error(err);
      showToast("Load error: " + err.message, "error");
    } finally {
      toggleGlobalLoader(false);
    }
  };

  // ── Build form HTML ───────────────────────────────────────────────────────
  function buildForm(container, prefix) {
    container.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="md:col-span-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Product Title</label>
          <input id="${prefix}_title" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 outline-none text-sm font-semibold"/>
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Description</label>
          <textarea id="${prefix}_desc" rows="3" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 outline-none text-sm"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Price (USD)</label>
          <input id="${prefix}_price" type="number" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-slate-900 outline-none text-sm font-mono font-bold"/>
          <div class="mt-1.5 text-xs text-slate-500">15% Deposit: <span class="font-mono font-bold text-amber-600" id="${prefix}_dep">0.00</span></div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Fabric</label>
          <select id="${prefix}_fabric" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white text-sm font-medium outline-none focus:ring-2 focus:ring-slate-900"></select>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">Categories</label>
          <div id="${prefix}_cats" class="bg-slate-50 border border-slate-200 rounded-lg p-4 grid grid-cols-2 gap-2.5 max-h-[140px] overflow-y-auto"></div>
        </div>
        <div class="flex flex-col justify-center space-y-3 px-2">
          <label class="inline-flex items-center text-sm font-semibold text-slate-700 cursor-pointer">
            <input type="checkbox" id="${prefix}_req" class="w-4 h-4 accent-slate-900 mr-2.5"/> Tailored
          </label>
          <label class="inline-flex items-center text-sm font-semibold text-slate-700 cursor-pointer">
            <input type="checkbox" id="${prefix}_stock" class="w-4 h-4 accent-slate-900 mr-2.5" checked/> In Stock
          </label>
        </div>

        <!-- Image section -->
        <div class="md:col-span-2 border-t border-slate-100 pt-4">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
            Images
            <span class="ml-2 text-slate-400 normal-case font-normal tracking-normal">— previewed locally, uploaded on commit</span>
          </label>
          <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-amber-400 transition-all">
            <svg class="w-7 h-7 text-slate-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-sm text-slate-500 font-semibold">Click to select photos</p>
            <p class="text-xs text-slate-400 mt-0.5">PNG, JPG, WEBP — multiple allowed</p>
            <input type="file" id="${prefix}_imgs" multiple class="hidden" accept="image/*"/>
          </label>

          <!-- Preview grid -->
          <div id="${prefix}_prev" class="flex flex-wrap gap-3 mt-4 empty:hidden"></div>
        </div>
      </div>

      <div class="pt-6 border-t border-slate-200 flex items-center justify-between">
        <p class="text-xs text-slate-400">Images upload to Cloudinary when you click Commit.</p>
        <button onclick="saveProduct('${prefix}')" class="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-lg text-sm transition-all shadow-md">
          Commit Changes
        </button>
      </div>
    `;

    // Populate selects and checkboxes
    $(`${prefix}_fabric`).innerHTML = fabricOptions.map(f =>
      `<option value="${f}">${f}</option>`).join("");

    $(`${prefix}_cats`).innerHTML = categoryOptions.map(c => `
      <label class="inline-flex items-center text-xs font-medium text-slate-700 capitalize cursor-pointer">
        <input type="checkbox" value="${c}" class="w-3.5 h-3.5 accent-slate-900 mr-2"/> ${c}
      </label>`).join("");

    // Deposit calculator
    $(`${prefix}_price`).oninput = (e) => {
      $(`${prefix}_dep`).innerText = deposit(e.target.value);
    };

    // Attach image engine AFTER DOM is ready
    attachImageEngine(prefix);
  }

  // ── Artisan ───────────────────────────────────────────────────────────────
  window.loadArtisan = async () => {
    const id = $("artisanDocId").value.trim();
    if (!id) return;
    try {
      const snap = await getDoc(doc(db, "artisans", id));
      if (!snap.exists()) { showToast("Artisan not found", "error"); return; }
      const a = snap.data();
      $("brandName").value = a.brandName || "";
      $("bio").value       = a.bio       || "";
      $("phone").value     = a.phone     || "";
      showToast("Artisan loaded", "info");
    } catch (err) {
      showToast("Load error", "error");
    }
  };

  window.saveArtisan = async () => {
    const id = $("artisanDocId").value.trim() || Date.now().toString();
    try {
      await setDoc(doc(db, "artisans", id), {
        brandName: $("brandName").value.trim(),
        bio:       $("bio").value.trim(),
        phone:     $("phone").value.trim(),
        updatedAt: serverTimestamp()
      }, { merge: true });
      showToast("Artisan saved ✓", "success");
    } catch (err) {
      showToast("Save error: " + err.message, "error");
    }
  };

  // ── Orders (placeholder — fill with your own query) ───────────────────────
  window.loadOrders = async () => {
    // TODO: query your orders collection
    $("ordersList").innerHTML = `<p class="text-slate-400 text-sm italic">No orders loaded yet.</p>`;
  };

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    buildForm($("addForm"), "add");
    loadOrders();
  });

  </script>
</body>
</html>
