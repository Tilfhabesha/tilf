<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tilf Habesha Admin</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.tabs{display:flex;background:#111}
.tabs button{flex:1;padding:14px;border:none;color:#fff;background:#111;font-weight:bold}
.tabs button.active{background:#333}
.section{display:none;padding:25px;max-width:1100px;margin:auto}
input,textarea,select{width:100%;padding:10px;margin:6px 0}
button{padding:10px 15px;border:none;background:black;color:white;margin-top:8px}
.card{background:#fff;padding:15px;border-radius:8px;margin:10px 0}
img{width:90px;border-radius:6px;margin:4px}
.notice{font-size:13px;color:green}
</style>
</head>
<body>

<div class="tabs">
  <button class="active" onclick="showTab(event,'orders')">Orders</button>
  <button onclick="showTab(event,'addProduct')">Add Product</button>
  <button onclick="showTab(event,'editProduct')">Edit Product</button>
  <button onclick="showTab(event,'artisan')">Artisan</button>
</div>

<div id="orders" class="section" style="display:block">
  <h2>Orders</h2>
  <div id="ordersList"></div>
  <div id="orderDetail"></div>
</div>

<div id="addProduct" class="section">
  <h2>Add Product</h2>
  <div id="addForm"></div>
</div>

<div id="editProduct" class="section">
  <h2>Edit Product</h2>
  <input id="editId" placeholder="Enter productId">
  <button onclick="loadProduct()">Load Product</button>
  <div id="editForm"></div>
</div>

<div id="artisan" class="section">
  <h2>Add / Edit Artisan</h2>

  <input id="artisanDocId" placeholder="Enter artisanId for edit">
  <button onclick="loadArtisan()">Load Artisan</button>

  <select id="artisanUser"></select>
  <input id="brandName" placeholder="Brand Name">
  <textarea id="bio" placeholder="Bio"></textarea>
  <input id="phone" placeholder="Phone">

  <button onclick="saveArtisan()">Save Artisan</button>
  <div id="artisanStats" class="notice"></div>
</div>

<script type="module">
import { db } from "./assets/js/firebase.js";
import {
collection, getDocs, doc, getDoc, addDoc, updateDoc,
query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);

/* ---------- Tabs ---------- */
window.showTab = (e,id)=>{
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  $(id).style.display='block';
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
};

/* ---------- Orders ---------- */
async function loadOrders(){
  const snap = await getDocs(collection(db,"orders"));
  $("ordersList").innerHTML="";
  snap.forEach(d=>{
    $("ordersList").innerHTML+=`
      <div class="card">
        <b>${d.id}</b> — ${d.data().status}
        <button onclick="viewOrder('${d.id}')">View</button>
      </div>`;
  });
}
loadOrders();

window.viewOrder = async id=>{
  const d = await getDoc(doc(db,"orders",id));
  $("orderDetail").innerHTML=`<pre>${JSON.stringify(d.data(),null,2)}</pre>`;
};

/* ---------- Product Form Builder ---------- */
function buildProductForm(container, prefix){
container.innerHTML=`
<input id="${prefix}_title" placeholder="Title">
<textarea id="${prefix}_desc" placeholder="Description"></textarea>
<input id="${prefix}_price" type="number" placeholder="Price">

<select id="${prefix}_artisan"></select>
<div id="${prefix}_cats"></div>

<select id="${prefix}_reqM">
<option value="true">Requires Measurement</option>
<option value="false">No Measurement</option>
</select>

<select id="${prefix}_stock">
<option value="true">In Stock</option>
<option value="false">Out of Stock</option>
</select>

<input type="file" id="${prefix}_imgs" multiple>
<div id="${prefix}_prev"></div>

<button onclick="saveProduct('${prefix}')">Save</button>
<div id="${prefix}_msg" class="notice"></div>
`;
populateRelations(prefix);
attachImage(prefix);
}

buildProductForm($("addForm"),"add");
buildProductForm($("editForm"),"edit");

/* ---------- Relations ---------- */
async function populateRelations(p){
  const arts = await getDocs(collection(db,"artisans"));
  const aSel = $(`${p}_artisan`);
  aSel.innerHTML="";
  arts.forEach(a=>{
    aSel.innerHTML+=`<option value="${a.id}">${a.data().brandName}</option>`;
  });

  const cats = await getDocs(collection(db,"categories"));
  const cDiv = $(`${p}_cats`);
  cDiv.innerHTML="";
  cats.forEach(c=>{
    cDiv.innerHTML+=`<label>
      <input type="checkbox" value="${c.id}"> ${c.data().name}
    </label><br>`;
  });
}

/* ---------- Images ---------- */
const imageStore={};

function attachImage(p){
  imageStore[p]=[];
  $(`${p}_imgs`).onchange=async e=>{
    for(const file of e.target.files){
      const url = await upload(file);
      imageStore[p].push(url);
      $(`${p}_prev`).innerHTML+=`<img src="${url}">`;
    }
  };
}

async function upload(file){
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset","dcc3dpccu");

  const r=await fetch("https://api.cloudinary.com/v1_1/dcc3dpccu/image/upload",
  {method:"POST",body:fd});
  const j=await r.json();
  return j.secure_url;
}

/* ---------- Save Product ---------- */
window.saveProduct=async p=>{
  const title=$(`${p}_title`).value;
  const desc=$(`${p}_desc`).value;
  const price=Number($(`${p}_price`).value);
  const artisan=$(`${p}_artisan`).value;

  const cats=[...$(`${p}_cats`).querySelectorAll('input:checked')]
    .map(c=>doc(db,"categories",c.value));

  const data={
    title,
    description:desc,
    price,
    depositAmount:price*0.15,
    images:imageStore[p],
    artisanId:doc(db,"artisans",artisan),
    categoryIds:cats,
    requiresMeasurement:$(`${p}_reqM`).value==="true",
    inStock:$(`${p}_stock`).value==="true",
    createdAt:serverTimestamp()
  };

  if(p==="edit"){
    await updateDoc(doc(db,"products",$("editId").value),data);
  }else{
    await addDoc(collection(db,"products"),data);
  }

  $(`${p}_msg`).innerText="Saved ✅";
};

/* ---------- Load Product ---------- */
window.loadProduct=async()=>{
  const id=$("editId").value;
  const d=await getDoc(doc(db,"products",id));
  const p=d.data();

  $("edit_title").value=p.title;
  $("edit_desc").value=p.description;
  $("edit_price").value=p.price;

  imageStore["edit"]=p.images||[];
  $("edit_prev").innerHTML="";
  p.images.forEach(u=>$("edit_prev").innerHTML+=`<img src="${u}">`);

  $("edit_artisan").value=p.artisanId.id;

  p.categoryIds.forEach(ref=>{
    $("edit_cats")
      .querySelector(`input[value="${ref.id}"]`).checked=true;
  });
};

/* ---------- Artisan ---------- */
async function loadArtisanUsers(){
  const q=query(collection(db,"users"),where("role","==","artisan"));
  const s=await getDocs(q);
  $("artisanUser").innerHTML="";
  s.forEach(u=>{
    $("artisanUser").innerHTML+=
      `<option value="${u.id}">${u.data().displayName}</option>`;
  });
}
loadArtisanUsers();

window.saveArtisan=async()=>{
  const data={
    userId:doc(db,"users",$("artisanUser").value),
    brandName:$("brandName").value,
    bio:$("bio").value,
    phone:$("phone").value,
    active:true
  };
  if($("artisanDocId").value){
    await updateDoc(doc(db,"artisans",$("artisanDocId").value),data);
  }else{
    await addDoc(collection(db,"artisans"),data);
  }
  $("artisanStats").innerText="Saved ✅";
};

window.loadArtisan=async()=>{
  const id=$("artisanDocId").value;
  const d=await getDoc(doc(db,"artisans",id));
  const a=d.data();

  $("brandName").value=a.brandName;
  $("bio").value=a.bio;
  $("phone").value=a.phone;

  const artRef=doc(db,"artisans",id);
  const q=query(collection(db,"orders"),
    where("artisanId","==",artRef));
  const s=await getDocs(q);
  $("artisanStats").innerText=`Total Orders: ${s.size}`;
};
</script>
</body>
</html>
