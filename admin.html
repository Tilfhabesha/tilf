<!DOCTYPE html>
<html>
<head>
  <title>Tilf Habesha Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:Arial;padding:30px;max-width:900px;margin:auto}
    input,textarea,select{width:100%;padding:10px;margin:8px 0}
    button{padding:12px 20px;background:black;color:white;border:none;margin-top:10px}
    img{width:120px;margin:5px;border-radius:6px}
    #preview{display:flex;flex-wrap:wrap}
  </style>
</head>
<body>

<h2>Add / Edit Product</h2>

<label>Product Title</label>
<input id="title" placeholder="e.g. Red Tibeb Kemis" oninput="makeSlug()">

<label>Slug (auto-generated)</label>
<input id="slug" readonly>
<small>Example: red-tibeb-kemis</small>
  
<label>Price (USD)</label>
<input id="price" type="number" placeholder="e.g. 320">

<label>Discount Price (optional)</label>
<input id="discountPrice" type="number" placeholder="e.g. 280">
  
<label>Fabric</label>
<select id="fabric">
  <option value="">Select fabric</option>
  <option>Cotton Tibeb</option>
  <option>Silk Tibeb</option>
  <option>Linen Tibeb</option>
  <option>Netela Cotton</option>
</select>
<label>Product Story</label>
<textarea id="description" rows="6"
placeholder="Example:
This Tibeb Kemis is traditionally worn during holidays and family gatherings.
Handwoven cotton with red tibeb patterns inspired by Gondar heritage.
Comfortable for long celebrations and cultural ceremonies."></textarea>

<label>Categories (choose all that apply)</label>
<div id="cats">
  <label><input type="checkbox" value="womens"> Womens</label>
  <label><input type="checkbox" value="mens"> Mens</label>
  <label><input type="checkbox" value="wedding"> Wedding</label>
  <label><input type="checkbox" value="holiday"> Holiday</label>
  <label><input type="checkbox" value="everyday"> Everyday</label>
  <label><input type="checkbox" value="netela"> Netela</label>
</div>

<input id="otherCategory" placeholder="If other, type category id">

<label><input type="checkbox" id="featured"> Featured product</label>
<label><input type="checkbox" id="measurementsRequired"> Requires measurements</label>

<small>Upload clear front images. First image will be used in hero and category cards.</small>
<input type="file" id="images" multiple>
<div id="preview"></div>

<button id="saveBtn" onclick="saveProduct()">
  <span id="btnText">Save Product</span>
  <span id="btnLoader" class="loader"></span>
</button>
  
<script type="module">
import { db } from "./assets/jsfirebase.js";
import {
  collection, addDoc, updateDoc, doc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cloudName = "dcc3dpccu";
const uploadPreset = "dcc3dpccu";

let uploadedImages = [];
let editingId = null;

/* ---------------- IMAGE UPLOAD (instant preview) ---------------- */

images.onchange = function(e){
  for (let file of e.target.files){
    uploadAndPreview(file);
  }
};

async function uploadAndPreview(file){
  const imgBox = document.createElement("img");
  imgBox.src = "loading.gif"; // optional loader image
  preview.appendChild(imgBox);

  const url = await uploadToCloudinary(file);

  imgBox.src = url;
  uploadedImages.push(url);
}

async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    { method: "POST", body: fd }
  );

  const data = await res.json();
  return data.secure_url;
}

/* ---------------- MULTI CATEGORY ---------------- */

function getSelectedCategories(){
  const checks = document.querySelectorAll(".catCheck:checked");
  const arr = [...checks].map(c=>c.value);

  if(arr.includes("other")){
    const other = otherCategory.value.trim();
    if(other) arr.push(other);
  }

  return arr;
}

/* ---------------- SAVE PRODUCT ---------------- */
if(!title.value || !price.value || !fabric.value || uploadedImages.length===0){
  alert("Please fill title, price, fabric and upload at least one image.");
  return;
}
window.saveProduct = async function(){
  const btn = event.target;
  btn.innerText = "Saving...";
  btn.disabled = true;
  const categoryId = [...document.querySelectorAll('#cats input:checked')]
  .map(c=>c.value);
  const product = {
    title: title.value,
    slug: slug.value,
    price: Number(price.value),
    discountPrice: Number(discountPrice.value) || null,
    fabric: fabric.value,
    description: description.value,
    categoryId: getSelectedCategories(),
    images: uploadedImages,
    featured: featured.checked,
    measurementsRequired: measurementsRequired.checked,
    inStock: true,
    createdAt: serverTimestamp()
  };

  try{
    if(editingId){
      await updateDoc(doc(db, "products", editingId), product);
      btn.innerText = "Updated ✅";
    }else{
      await addDoc(collection(db, "products"), product);
      btn.innerText = "Saved ✅";
    }
  }catch(e){
    btn.innerText = "Error ❌";
    console.error(e);
  }

  setTimeout(()=>location.reload(),1500);
};

/* ---------------- LOAD FOR EDIT ---------------- */

const params = new URLSearchParams(window.location.search);
const id = params.get("edit");

if(id){
  editingId = id;
  const snap = await getDoc(doc(db,"products",id));
  const data = snap.data();

  title.value = data.title;
  slug.value = data.slug;
  price.value = data.price;
  discountPrice.value = data.discountPrice;
  fabric.value = data.fabric;
  description.value = data.description;
  featured.checked = data.featured;
  measurementsRequired.checked = data.measurementsRequired;

  uploadedImages = data.images || [];
  uploadedImages.forEach(url=>{
    const img = document.createElement("img");
    img.src = url;
    preview.appendChild(img);
  });

  // check categories
  if(data.categoryId){
    data.categoryId.forEach(cat=>{
      const el = document.querySelector(`.catCheck[value="${cat}"]`);
      if(el) el.checked = true;
    });
  }
}
function makeSlug(){
  slug.value = title.value
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

</script>

</body>
</html>
