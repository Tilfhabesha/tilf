<style>

<body>

<div class="tabs">

/* ================= HELPERS ================= */
const $ = id => document.getElementById(id);

function normalizeTitle(title){
  return title.toLowerCase()
    .replace(/['"]/g,'')
    .replace(/\s+/g,'-')
    .replace(/[^a-z0-9-]/g,'');
}

function slugify(title){
  return title.toLowerCase().replace(/\s+/g,'-');
}

function deposit(price){
  return Number((price * 0.15).toFixed(2));
}

/* ================= TABS ================= */
window.showTab = (e,id)=>{
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  $(id).style.display='block';
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
};

/* ================= ORDERS ================= */
async function loadOrders(){
  const snap = await getDocs(collection(db,"orders"));
  $("ordersList").innerHTML="";
  snap.forEach(d=>{
    $("ordersList").innerHTML+=`
      <div class="card">
        <b>${d.id}</b> — ${d.data().status}
        <button onclick="viewOrder('${d.id}')">View</button>
      </div>`;
  });
}
loadOrders();

window.viewOrder = async (id)=>{
  const d = await getDoc(doc(db,"orders",id));
  $("orderDetail").innerHTML =
    `<pre>${JSON.stringify(d.data(),null,2)}</pre>`;
};

/* ================= PRODUCT SYSTEM ================= */
const fabricOptions = ["cotton tibeb","linen","silk","velvet","wool blend"];
const categoryOptions = ["holiday","women","men","wedding","events","new fashion","casual"];

const state = { images: [] };

/* ---------- FORM ---------- */
function buildForm(container,prefix){

container.innerHTML=`
<input id="${prefix}_title" placeholder="Title">
<textarea id="${prefix}_desc" placeholder="Description"></textarea>

<input id="${prefix}_price" type="number" placeholder="Price">

<div id="${prefix}_cats"></div>

<label><input type="checkbox" id="${prefix}_req"> Measurement Required</label>
<label><input type="checkbox" id="${prefix}_stock"> In Stock</label>

<input type="file" id="${prefix}_imgs" multiple>
<div id="${prefix}_prev"></div>

<button onclick="saveProduct('${prefix}')">Save Product</button>
<div id="${prefix}_msg"></div>
`;

loadOptions(prefix);
attach(prefix);
}

buildForm($("addForm"),"add");
buildForm($("editForm"),"edit");

/* ---------- OPTIONS ---------- */
async function loadOptions(p){

fabricOptions.forEach(f=>{
  $(`${p}_fabric`).innerHTML+=`<option>${f}</option>`;
});

categoryOptions.forEach(c=>{
  $(`${p}_cats`).innerHTML+=`
    <label><input type="checkbox" value="${c}"> ${c}</label><br>
  `;
});
}

/* ---------- IMAGE ---------- */
function attach(p){
state.images=[];

$(`${p}_imgs`).onchange = async (e)=>{
  for(const f of e.target.files){
    const url = await upload(f);
    state.images.push(url);

    const img=document.createElement("img");
    img.src=url;
    $(`${p}_prev`).appendChild(img);
  }
};
}

async function upload(file){
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset","dcc3dpccu");

  const r=await fetch(
    "https://api.cloudinary.com/v1_1/dcc3dpccu/image/upload",
    {method:"POST",body:fd}
  );

  const j=await r.json();
  return j.secure_url;
}
